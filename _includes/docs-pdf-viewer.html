<div class="iframe-container docs-pdf-iframe-container" style="border: 1px solid #ddd; height: {% if page.embed %}100vh{% else %}calc(100vh - 60px){% endif %};">
  <iframe
    src="{{ page.pdf | relative_url }}"
    style="width: 100%; height: 100%;"
    frameborder="0"
    title="{{ page.title | default: 'Document' | escape }} PDF">
    Your browser does not support PDF viewing.
    <a href="{{ page.pdf | relative_url }}" target="_blank" rel="noopener">Download PDF</a>
  </iframe>
</div>
