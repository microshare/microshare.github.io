name: Sync doc translations

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to sync translations on (checkout and push)
        required: true
        type: string
        default: main
      base_branch:
        description: Base branch to compare against for changed English docs
        required: true
        type: string
        default: main

permissions:
  contents: write

concurrency:
  group: i18n-docs-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Translate changed English docs
        run: |
          git fetch origin "${{ inputs.base_branch }}" "${{ inputs.branch }}"
          BASE_SHA="$(git merge-base "origin/${{ inputs.base_branch }}" HEAD)"
          HEAD_SHA="$(git rev-parse HEAD)"
          echo "Comparing ${BASE_SHA}..${HEAD_SHA} (base: ${{ inputs.base_branch }}, branch: ${{ inputs.branch }})"
          bash scripts/i18n-sync-changed.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Commit and push translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- docs/2/fr docs/2/de docs/2/es; then
            echo "No translation changes to commit."
            exit 0
          fi

          git add docs/2/fr docs/2/de docs/2/es
          git commit -m "chore(i18n): sync translations for changed English docs" -m "Auto-generated by the i18n-docs GitHub Action."
          git push origin "HEAD:${{ inputs.branch }}"
