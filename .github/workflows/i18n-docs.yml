name: Sync doc translations

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/2/**'
      - 'scripts/i18n-md.mjs'
      - 'scripts/i18n-sync-changed.sh'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: i18n-docs-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  translate:
    # Secrets are not available to fork PRs; skip those runs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Translate changed English docs
        run: bash scripts/i18n-sync-changed.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Commit and push translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- docs/2/fr docs/2/de docs/2/es; then
            echo "No translation changes to commit."
            exit 0
          fi

          git add docs/2/fr docs/2/de docs/2/es
          git commit -m "chore(i18n): sync translations for changed English docs" -m "Auto-generated by the i18n-docs GitHub Action."
          git push
